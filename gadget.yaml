name: trace http
description: Extract and correlate HTTP/1.x request/response exchanges from TCP connections
homepageURL: https://inspektor-gadget.io/
documentationURL: https://github.com/your-org/trace_http/blob/main/README.md
sourceURL: https://github.com/your-org/trace_http
params:
  ebpf:
    req_body:
      key: req-body
      defaultValue: "false"
      description: Capture a sample of each request body (adds a per-message copy)
      title: Capture request body
    res_body:
      key: res-body
      defaultValue: "false"
      description: Capture a sample of each response body (adds a per-message copy)
      title: Capture response body
    req_body_len:
      key: req-body-len
      defaultValue: "1024"
      description: Maximum request body bytes to capture when --req-body is set (max 1024)
      title: Request body sample length
    res_body_len:
      key: res-body-len
      defaultValue: "1024"
      description: Maximum response body bytes to capture when --res-body is set (max 1024)
      title: Response body sample length
    sse:
      key: sse
      defaultValue: "false"
      description: For text/event-stream responses, emit one event per Server-Sent Event record (reusing the request fields, with per-record size/timing and the record as the response body)
      title: Split Server-Sent Events
datasources:
  # One event per request/response exchange. The eBPF program correlates the two
  # in the kernel and appends both raw header blocks (request then response) as
  # "data"; the WASM module parses method/path/host/status from them in place.
  http:
    annotations:
      ebpf.rest.name: data
      ebpf.rest.len: data_len
    fields:
      data:
        annotations:
          columns.hidden: "true"
          json.skip: "true"
      timestamp_raw:
        annotations:
          description: Time the request started
          columns.hidden: "true"
      src:
        annotations:
          template: l4endpoint
          description: Client (request sender) endpoint
      dst:
        annotations:
          template: l4endpoint
          description: Server (request receiver) endpoint
      method:
        annotations:
          description: HTTP request method
          columns.width: "7"
      path:
        annotations:
          description: HTTP request target/path
          columns.width: "32"
          columns.alignment: left
      http_version:
        annotations:
          description: HTTP protocol version of the request, e.g. 1.1
          columns.width: "4"
      host:
        annotations:
          description: Value of the request Host header
          columns.width: "20"
          columns.alignment: left
          columns.hidden: "true"
      status_code:
        annotations:
          description: HTTP response status code (0 if no response was captured)
          columns.width: "6"
      content_type:
        annotations:
          description: Value of the Content-Type header (response, else request)
          columns.width: "20"
          columns.alignment: left
      request_size:
        annotations:
          description: Total request size in bytes (headers + body)
          columns.width: "8"
      response_size:
        annotations:
          description: Total response size in bytes (headers + body), 0 if unknown
          columns.width: "8"
      latency_ttfb_ns:
        annotations:
          description: Time from request start to the first response byte, in nanoseconds
          columns.width: "12"
      latency_total_ns:
        annotations:
          description: Time from request start to the last response byte, in nanoseconds (0 if unknown)
          columns.width: "12"
      is_chunked:
        annotations:
          description: Whether the response used chunked transfer-encoding
          columns.hidden: "true"
      is_websocket:
        annotations:
          description: Whether the exchange upgraded to a websocket
          columns.hidden: "true"
      complete:
        annotations:
          description: Whether both request and full response were captured
          columns.hidden: "true"
      is_sse:
        annotations:
          description: Whether this row is one Server-Sent Events push (--sse)
          columns.hidden: "true"
      request_body:
        annotations:
          description: First bytes of the request body (up to 1024 bytes)
          content-type: application/octet-stream
          columns.hidden: "true"
      response_body:
        annotations:
          description: First bytes of the response body (up to 1024 bytes)
          content-type: application/octet-stream
          columns.width: "32"
          columns.alignment: left
          columns.hidden: "true"
      # Internal framing/length fields carried for the WASM parser.
      req_hdr_len:
        annotations:
          columns.hidden: "true"
          json.skip: "true"
      req_data_len:
        annotations:
          columns.hidden: "true"
          json.skip: "true"
      resp_hdr_len:
        annotations:
          columns.hidden: "true"
          json.skip: "true"
      resp_data_len:
        annotations:
          columns.hidden: "true"
          json.skip: "true"
      data_len:
        annotations:
          columns.hidden: "true"
          json.skip: "true"
      pad:
        annotations:
          columns.hidden: "true"
          json.skip: "true"
      netns_id:
        annotations:
          columns.hidden: "true"
          json.skip: "true"

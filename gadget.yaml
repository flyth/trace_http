name: trace http
description: Extract and correlate HTTP/1.x request/response exchanges from TCP connections
homepageURL: https://inspektor-gadget.io/
documentationURL: https://github.com/your-org/trace_http/blob/main/README.md
sourceURL: https://github.com/your-org/trace_http
params:
  wasm:
    idle-timeout-seconds:
      key: idle-timeout-seconds
      defaultValue: "10"
      description: Emit a request-only row for an exchange whose response was not seen within this many seconds
      title: Idle timeout
    max-pending:
      key: max-pending
      defaultValue: "16384"
      description: Maximum number of in-flight requests held while awaiting their response
      title: Max pending exchanges
datasources:
  # Internal per-message stream produced by the eBPF program. It is not shown;
  # the WASM module consumes it and emits the correlated "http" datasource.
  http_msg:
    annotations:
      # The raw "data" payload (headers + bounded body preview) is appended
      # after the fixed event by the eBPF program; "data_len" gives its length.
      ebpf.rest.name: data
      ebpf.rest.len: data_len
  # User-facing datasource: one event per request/response exchange.
  http:
    fields:
      timestamp_raw:
        annotations:
          description: Time the request started
          columns.hidden: "true"
      src:
        annotations:
          description: Client (request sender) endpoint
          columns.width: "22"
          columns.alignment: left
      dst:
        annotations:
          description: Server (request receiver) endpoint
          columns.width: "22"
          columns.alignment: left
      method:
        annotations:
          description: HTTP request method
          columns.width: "7"
      path:
        annotations:
          description: HTTP request target/path
          columns.width: "32"
          columns.alignment: left
      http_version:
        annotations:
          description: HTTP protocol version of the request, e.g. 1.1
          columns.width: "4"
      host:
        annotations:
          description: Value of the request Host header
          columns.width: "20"
          columns.alignment: left
          columns.hidden: "true"
      status_code:
        annotations:
          description: HTTP response status code (0 if no response was captured)
          columns.width: "6"
      request_size:
        annotations:
          description: Total request size in bytes (headers + body)
          columns.width: "8"
      response_size:
        annotations:
          description: Total response size in bytes (headers + body), 0 if unknown
          columns.width: "8"
      latency_ttfb_ns:
        annotations:
          description: Time from request start to the first response byte, in nanoseconds
          columns.width: "12"
      latency_total_ns:
        annotations:
          description: Time from request start to the last response byte, in nanoseconds (0 if unknown)
          columns.width: "12"
      comm:
        annotations:
          description: Command of the process that owns the connection
          columns.width: "16"
          columns.alignment: left
      pid:
        annotations:
          description: PID of the process that owns the connection
          columns.hidden: "true"
      mntns_id:
        annotations:
          description: Mount namespace of the owning process. Internal use only.
          columns.hidden: "true"
          json.skip: "true"
      is_chunked:
        annotations:
          description: Whether the response used chunked transfer-encoding
          columns.hidden: "true"
      is_websocket:
        annotations:
          description: Whether the exchange upgraded to a websocket
          columns.hidden: "true"
      complete:
        annotations:
          description: Whether both request and full response were captured
          columns.hidden: "true"
      request_body:
        annotations:
          description: First bytes of the request body (up to 1024 bytes)
          content-type: application/octet-stream
          columns.hidden: "true"
      response_body:
        annotations:
          description: First bytes of the response body (up to 1024 bytes)
          content-type: application/octet-stream
          columns.width: "32"
          columns.alignment: left
          columns.hidden: "true"
